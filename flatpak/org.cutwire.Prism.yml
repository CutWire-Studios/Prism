app-id: org.cutwire.Prism
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
command: Prism
rename-icon: org.cutwire.Prism

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-run/pipewire-0
  - --talk-name=org.freedesktop.portal.*
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess

add-extensions:
  org.freedesktop.Platform.GStreamer:
    version: '25.08'
    directory: lib/extensions/gstreamer-1.0
    subdirectories: true

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/aclocal
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: re2
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DRE2_BUILD_TESTING=OFF
    sources:
      - type: archive
        url: https://github.com/google/re2/releases/download/2024-07-02/re2-2024-07-02.tar.gz
        sha256: eb2df807c781601c14a260a507a5bb4509be1ee626024cb45acbd57cb9d4032b

  - name: kissfft
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DKISSFFT_DATATYPE=float
      - -DKISSFFT_STATIC=ON
      - -DKISSFFT_TEST=OFF
      - -DKISSFFT_TOOLS=OFF
      - -DKISSFFT_OPENMP=OFF
    sources:
      - type: archive
        url: https://github.com/mborgerding/kissfft/archive/131.1.0.tar.gz
        sha256: 76c1aac87ddb7258f34b08a13f0eebf9e53afa299857568346aa5c82bcafaf1a

  - name: libzip
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_LIBDIR=lib
      - -DBUILD_SHARED_LIBS=ON
      - -DENABLE_BZIP2=OFF
      - -DENABLE_LZMA=OFF
      - -DENABLE_ZSTD=OFF
      - -DENABLE_OPENSSL=OFF
      - -DBUILD_TOOLS=OFF
      - -DBUILD_REGRESS=OFF
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_DOC=OFF
    sources:
      - type: archive
        url: https://libzip.org/download/libzip-1.11.4.tar.gz
        sha256: 82e9f2f2421f9d7c2466bbc3173cd09595a88ea37db0d559a9d0a2dc60dc722e

  - name: lua
    buildsystem: simple
    build-commands:
      - make posix MYCFLAGS="-fPIC" -j${FLATPAK_BUILDER_N_JOBS}
      - make install INSTALL_TOP=/app
      - install -d /app/lib/pkgconfig
      # Vanilla Lua ships no pkg-config file; Prism looks up `lua5.4`.
      - |
        printf 'prefix=/app\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\n\nName: Lua\nDescription: An Extensible Extension Language\nVersion: 5.4.8\nLibs: -L${libdir} -llua -lm -ldl\nCflags: -I${includedir}\n' > /app/lib/pkgconfig/lua5.4.pc
    sources:
      - type: archive
        url: https://www.lua.org/ftp/lua-5.4.8.tar.gz
        sha256: 4f18ddae154e793e46eeab727c59ef1c0c0c2b744e7b94219710d76f530629ae

  - name: Prism
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSWITCHX_WITH_NDI=OFF
      - -DSWITCHX_WITH_LUA=ON
      - -DSWITCHX_WITH_WEBRTC=ON
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    build-options:
      prepend-pkg-config-path: /app/lib/pkgconfig
      # sol2 (Lua) and libdatachannel (WebRTC) are pulled via CMake FetchContent
      # at configure time, so the build sandbox needs network access.
      build-args:
        - --share=network
    post-install:
      # builddir:true runs these from _flatpak_build/, so reach back to the source root.
      - install -Dm644 ../flatpak/org.cutwire.Prism.desktop /app/share/applications/org.cutwire.Prism.desktop
      - install -Dm644 ../flatpak/org.cutwire.Prism.metainfo.xml /app/share/metainfo/org.cutwire.Prism.metainfo.xml
      - install -Dm644 ../flatpak/share/icons/hicolor/scalable/apps/org.cutwire.Prism.svg /app/share/icons/hicolor/scalable/apps/org.cutwire.Prism.svg
    sources:
      - type: dir
        path: ..
        skip:
          - flatpak/.flatpak-builder
          - flatpak/build-dir
          - flatpak/repo
          - build
